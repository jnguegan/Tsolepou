<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSOLEPOU INTERNATIONAL | Tenerife Private Experiences</title>
  <meta
    name="description"
    content="TSOLEPOU INTERNATIONAL presents Tenerife Private Experiences. Bespoke experiences, curated privately."
  />
  <style>
    :root {
      --bg: #0b0b0d;
      --bg-soft: #111116;
      --text: #f5f2ea;
      --muted: #b9b3a7;
      --gold: #c8a96b;
      --gold-soft: #e0c28d;
      --line: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(200, 169, 107, 0.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(200, 169, 107, 0.06), transparent 24%),
        linear-gradient(180deg, #09090b 0%, #0d0d11 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      flex-direction: column;
    }

    body.rtl {
      direction: rtl;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 18px 20px 0;
    }

    .lang-switcher {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .lang-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .lang-btn:hover {
      color: var(--text);
      border-color: rgba(200,169,107,0.35);
    }

    .lang-btn.active {
      background: linear-gradient(180deg, rgba(200,169,107,0.18), rgba(200,169,107,0.08));
      border-color: rgba(200,169,107,0.45);
      color: var(--gold-soft);
    }

    .hero {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px 20px 32px;

  background:
    linear-gradient(90deg, rgba(8,8,10,0.82), rgba(8,8,10,0.30)),
    url("hero-main.jpg") center center / cover no-repeat fixed;
}

    .hero-card {
      width: 100%;
      max-width: 860px;
      padding: 56px 36px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .brand-kicker {
      display: inline-block;
      margin-bottom: 22px;
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
    }

    body.rtl .brand-kicker {
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 600;
      color: var(--text);
    }

    .subhead {
      margin: 18px auto 0;
      max-width: 620px;
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.7;
      color: var(--muted);
    }

    .cta-wrap {
      margin-top: 34px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 28px;
      border-radius: 999px;
      border: 1px solid rgba(200, 169, 107, 0.45);
      background: linear-gradient(180deg, var(--gold-soft), var(--gold));
      color: #0b0b0d;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.25s ease, filter 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.25);
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }

    .trust {
      padding: 0 20px 42px;
    }

    .trust-inner {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 24px;
      text-align: center;
    }

    .trust-item {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .trust-item strong {
      color: var(--text);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .topbar {
        padding: 14px 12px 0;
      }

      .hero {
        padding: 20px 12px 20px;
        background:
      linear-gradient(90deg, rgba(8,8,10,0.82), rgba(8,8,10,0.30)),
      url("hero-main.jpg") center center / cover no-repeat;
  }

      .hero-card {
        padding: 40px 22px;
        border-radius: 22px;
      }

      .trust {
        padding: 0 12px 28px;
      }

      .trust-inner {
        gap: 8px 14px;
      }

      .trust-item {
        width: 100%;
      }

      .lang-switcher {
        gap: 8px;
      }

      .lang-btn {
        font-size: 12px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="ar">AR</button>
      </div>
    </div>

    <main class="hero">
      <section class="hero-card">
        <div class="brand-kicker" id="brandKicker">TSOLEPOU INTERNATIONAL</div>
        <h1 id="headline">Tenerife Private Experiences</h1>
        <p class="subhead" id="subhead">Bespoke experiences. Curated privately.</p>
        <div class="cta-wrap">
          <a class="cta-btn" id="ctaBtn" href="/tpe/">Enter Experience</a>
        </div>
      </section>
    </main>

    <footer class="trust">
      <div class="trust-inner">
        <div class="trust-item"><strong id="trust1">Operated by TSOLEPOU INTERNATIONAL SL</strong></div>
        <div class="trust-item" id="trust2">Spanish company incorporated in 2020</div>
        <div class="trust-item" id="trust3">Registered in Santa Cruz de Tenerife</div>
      </div>
    </footer>
  </div>

  <script>
    const translations = {
      en: {
        brandKicker: "TSOLEPOU INTERNATIONAL",
        headline: "Tenerife Private Experiences",
        subhead: "Bespoke experiences. Curated privately.",
        ctaBtn: "Enter Experience",
        trust1: "Operated by TSOLEPOU INTERNATIONAL SL",
        trust2: "Spanish company incorporated in 2020",
        trust3: "Registered in Santa Cruz de Tenerife",
        title: "TSOLEPOU INTERNATIONAL | Tenerife Private Experiences",
        description: "TSOLEPOU INTERNATIONAL presents Tenerife Private Experiences. Bespoke experiences, curated privately.",
        dir: "ltr",
        lang: "en"
      },
      fr: {
        brandKicker: "TSOLEPOU INTERNATIONAL",
        headline: "Expériences Privées à Tenerife",
        subhead: "Des expériences sur mesure. Conçues en toute discrétion.",
        ctaBtn: "Entrer",
        trust1: "Exploité par TSOLEPOU INTERNATIONAL SL",
        trust2: "Société espagnole constituée en 2020",
        trust3: "Immatriculée à Santa Cruz de Tenerife",
        title: "TSOLEPOU INTERNATIONAL | Expériences Privées à Tenerife",
        description: "TSOLEPOU INTERNATIONAL présente Expériences Privées à Tenerife. Des expériences sur mesure, conçues en toute discrétion.",
        dir: "ltr",
        lang: "fr"
      },
      es: {
        brandKicker: "TSOLEPOU INTERNATIONAL",
        headline: "Experiencias Privadas en Tenerife",
        subhead: "Experiencias a medida. Cuidadosamente seleccionadas en privado.",
        ctaBtn: "Entrar",
        trust1: "Operado por TSOLEPOU INTERNATIONAL SL",
        trust2: "Sociedad española constituida en 2020",
        trust3: "Registrada en Santa Cruz de Tenerife",
        title: "TSOLEPOU INTERNATIONAL | Experiencias Privadas en Tenerife",
        description: "TSOLEPOU INTERNATIONAL presenta Experiencias Privadas en Tenerife. Experiencias a medida, seleccionadas en privado.",
        dir: "ltr",
        lang: "es"
      },
      de: {
        brandKicker: "TSOLEPOU INTERNATIONAL",
        headline: "Private Erlebnisse auf Teneriffa",
        subhead: "Maßgeschneiderte Erlebnisse. Diskret kuratiert.",
        ctaBtn: "Erlebnis betreten",
        trust1: "Betrieben von TSOLEPOU INTERNATIONAL SL",
        trust2: "Spanisches Unternehmen, gegründet 2020",
        trust3: "Registriert in Santa Cruz de Tenerife",
        title: "TSOLEPOU INTERNATIONAL | Private Erlebnisse auf Teneriffa",
        description: "TSOLEPOU INTERNATIONAL präsentiert Private Erlebnisse auf Teneriffa. Maßgeschneiderte Erlebnisse, diskret kuratiert.",
        dir: "ltr",
        lang: "de"
      },
      ru: {
        brandKicker: "TSOLEPOU INTERNATIONAL",
        headline: "Частные впечатления на Тенерифе",
        subhead: "Индивидуальные впечатления. Организовано конфиденциально.",
        ctaBtn: "Перейти",
        trust1: "Управляется TSOLEPOU INTERNATIONAL SL",
        trust2: "Испанская компания, основанная в 2020 году",
        trust3: "Зарегистрирована в Санта-Крус-де-Тенерифе",
        title: "TSOLEPOU INTERNATIONAL | Частные впечатления на Тенерифе",
        description: "TSOLEPOU INTERNATIONAL представляет частные впечатления на Тенерифе. Индивидуальные впечатления, организованные конфиденциально.",
        dir: "ltr",
        lang: "ru"
      },
      ar: {
        brandKicker: "TSOLEPOU INTERNATIONAL",
        headline: "تجارب تينيريفي الخاصة",
        subhead: "تجارب مصممة خصيصاً. منسقة بخصوصية.",
        ctaBtn: "الدخول إلى التجربة",
        trust1: "تُدار من قبل TSOLEPOU INTERNATIONAL SL",
        trust2: "شركة إسبانية تأسست في عام 2020",
        trust3: "مسجلة في سانتا كروز دي تينيريفي",
        title: "TSOLEPOU INTERNATIONAL | تجارب تينيريفي الخاصة",
        description: "تقدم TSOLEPOU INTERNATIONAL تجارب تينيريفي الخاصة. تجارب مصممة خصيصاً ومنسقة بخصوصية.",
        dir: "rtl",
        lang: "ar"
      }
    };

    const els = {
      brandKicker: document.getElementById("brandKicker"),
      headline: document.getElementById("headline"),
      subhead: document.getElementById("subhead"),
      ctaBtn: document.getElementById("ctaBtn"),
      trust1: document.getElementById("trust1"),
      trust2: document.getElementById("trust2"),
      trust3: document.getElementById("trust3"),
      metaDescription: document.querySelector('meta[name="description"]')
    };

    const buttons = document.querySelectorAll(".lang-btn");

    function setLanguage(lang) {
      const t = translations[lang] || translations.en;

      els.brandKicker.textContent = t.brandKicker;
      els.headline.textContent = t.headline;
      els.subhead.textContent = t.subhead;
      els.ctaBtn.textContent = t.ctaBtn;
      els.trust1.textContent = t.trust1;
      els.trust2.textContent = t.trust2;
      els.trust3.textContent = t.trust3;
      document.title = t.title;
      els.metaDescription.setAttribute("content", t.description);
      document.documentElement.lang = t.lang;
      document.body.classList.toggle("rtl", t.dir === "rtl");
      document.documentElement.dir = t.dir;

      buttons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });

      localStorage.setItem("tsolepouLandingLang", lang);
    }

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        setLanguage(btn.dataset.lang);
      });
    });

    const savedLang = localStorage.getItem("tsolepouLandingLang") || "en";
    setLanguage(savedLang);
  </script>
</body>
</html>
